<!-- SEARCH / BROWSE VIEW -->
<div id="view-search">
  <h2 class="sr-only" data-i18n="search_heading">Search products</h2>
  <div class="search-row">
    <div class="search-wrap" id="search-box">
      <span class="search-icon">&#128270;</span>
      <input class="search-input" id="search-input" data-i18n-placeholder="search_placeholder" placeholder="Search for product or EAN..." oninput="onSearchInput()" aria-label="Search for product or EAN">
      <button type="button" class="search-clear" id="search-clear" onclick="clearSearch()" aria-label="Clear search">&times;</button>
    </div>
    <button type="button" class="btn-scan-search" onclick="openSearchScanner()" data-i18n-title="search_scan_title" title="Scan barcode to find product" aria-label="Scan barcode to find product">&#128247;</button>
  </div>
  <div class="filter-wrap" id="filter-wrap">
    <div style="display:flex;gap:6px;align-items:center;flex-wrap:wrap">
      <button type="button" class="filter-toggle" id="adv-filter-toggle" onclick="toggleAdvancedFilters()" aria-expanded="false" aria-controls="advanced-filters" data-i18n="adv_filter_toggle">Advanced filter</button>
      <button type="button" class="filter-toggle" id="filter-toggle" onclick="toggleFilters()" aria-expanded="false" aria-controls="filter-row">
        <span id="filter-toggle-label" data-i18n="filter_all">All categories</span> <span class="ft-arrow">&#9660;</span>
      </button>
    </div>
    <div class="filter-row" id="filter-row"></div>
  </div>
  <div id="advanced-filters" class="adv-filters"></div>
  <div class="result-count" id="result-count"></div>
  <div id="results-container" role="region" aria-label="Search results">
    <div class="loading">
      <span class="spinner"></span>
      <span data-i18n="loading_products">Loading products...</span>
    </div>
  </div>
</div>
