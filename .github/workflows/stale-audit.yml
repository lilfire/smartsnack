name: Stale Branch & PR Audit

on:
  schedule:
    # Daily at 06:00 UTC
    - cron: "0 6 * * *"
  workflow_dispatch:
    inputs:
      cleanup:
        description: "Run in cleanup mode (merge green PRs, delete stale branches)"
        required: false
        default: "false"
        type: choice
        options:
          - "false"
          - "true"
      stale_branch_hours:
        description: "Hours before a branch without a PR is considered stale"
        required: false
        default: "48"
      stale_pr_hours:
        description: "Hours before a green open PR is flagged"
        required: false
        default: "24"

permissions:
  contents: write
  pull-requests: write
  issues: write

jobs:
  audit:
    name: Audit Stale Branches & PRs
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Run stale audit
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PAPERCLIP_API_URL: ${{ secrets.PAPERCLIP_API_URL }}
          PAPERCLIP_API_KEY: ${{ secrets.PAPERCLIP_API_KEY }}
          PAPERCLIP_COMPANY_ID: ${{ secrets.PAPERCLIP_COMPANY_ID }}
        run: |
          chmod +x scripts/audit-stale-branches.sh

          ARGS=""
          if [[ "${{ inputs.cleanup }}" == "true" ]]; then
            ARGS="--cleanup"
          fi
          if [[ -n "${{ inputs.stale_branch_hours }}" ]]; then
            ARGS="$ARGS --stale-branch-hours ${{ inputs.stale_branch_hours }}"
          fi
          if [[ -n "${{ inputs.stale_pr_hours }}" ]]; then
            ARGS="$ARGS --stale-pr-hours ${{ inputs.stale_pr_hours }}"
          fi

          bash scripts/audit-stale-branches.sh $ARGS 2>&1 | tee /tmp/audit-output.txt

      - name: Post audit results as issue comment
        if: always()
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          REPORT=$(cat /tmp/audit-output.txt)

          # Find or create the tracking issue
          ISSUE_NUMBER=$(gh issue list --label "audit" --state open --json number --jq '.[0].number' 2>/dev/null || echo "")

          BODY="## Stale Branch & PR Audit — $(date -u +%Y-%m-%d)

          \`\`\`
          ${REPORT}
          \`\`\`

          _Generated by [stale-audit.yml](/.github/workflows/stale-audit.yml)_"

          if [[ -n "$ISSUE_NUMBER" ]]; then
            gh issue comment "$ISSUE_NUMBER" --body "$BODY"
          else
            # Create label if it doesn't exist
            gh label create "audit" --description "Automated audit reports" --color "d4c5f9" 2>/dev/null || true
            gh issue create \
              --title "Stale Branch & PR Audit Report" \
              --label "audit" \
              --body "$BODY"
          fi
