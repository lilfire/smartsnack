name: CI

on:
  push:
    branches: [development, main]
  pull_request:
    branches: [development, main]

jobs:
  test:
    name: Unit Tests (pytest)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt pytest pytest-cov

      - name: Run pytest with coverage
        run: python -m pytest --cov --ignore=tests/e2e --tb=short -q

  frontend-test:
    name: Frontend Tests (vitest)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run vitest with coverage
        run: npx vitest run --coverage

  e2e-coverage:
    name: E2E Endpoint Coverage Check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Check E2E endpoint coverage
        # Warning-only: does not block the build. Use --strict to make it a hard gate.
        run: python scripts/check_e2e_coverage.py

  build:
    name: Docker Build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image (no push)
        run: docker compose build
        env:
          SMARTSNACK_SECRET_KEY: ci-build-dummy-key
          DOCKER_BUILDKIT: "1"

  smoke-test:
    name: Smoke Test
    runs-on: ubuntu-latest
    needs: [build]
    env:
      SMARTSNACK_SECRET_KEY: ci-test-dummy-key
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Start containers
        run: docker compose up -d --build

      - name: Wait for healthcheck
        run: |
          echo "Waiting for container to be healthy..."
          for i in $(seq 1 30); do
            if docker compose ps --format json | grep -q '"Health":"healthy"'; then
              echo "Container is healthy"
              exit 0
            fi
            echo "Attempt $i/30 - waiting 5s..."
            sleep 5
          done
          echo "Container did not become healthy in time"
          docker compose logs
          exit 1

      - name: Verify health endpoint
        run: |
          curl -f http://localhost:5001/health || \
            (echo "Health endpoint failed"; docker compose logs; exit 1)

      - name: Tear down
        if: always()
        run: docker compose down

  e2e-test:
    name: E2E Tests (Playwright)
    runs-on: ubuntu-latest
    needs: [build]
    env:
      SMARTSNACK_SECRET_KEY: ci-e2e-dummy-key
      PLAYWRIGHT_BROWSERS_PATH: /tmp/ms-playwright
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y tesseract-ocr libcairo2

      - name: Install Python dependencies
        run: pip install -r requirements-dev.txt

      - name: Install Playwright browsers
        run: python -m playwright install --with-deps chromium

      - name: Run E2E tests
        # The tests/e2e/ conftest.py launches its own in-process Flask server
        # on a random port (see app_server fixture), so no external server is
        # needed. Tests use Playwright to drive a real browser against the
        # in-process app.
        # Scoped to the category test files targeted by LSO-1112/LSO-1128.
        run: python -m pytest tests/e2e/test_categories_update_browser.py tests/e2e/test_category_delete_move.py --tb=short -q
