        #   - tests/e2e/test_pq_crud.py                      (LSO-1168)
        #   - tests/e2e/test_pq_update.py                    (LSO-1168)
        #   - tests/e2e/test_pq_update_browser.py            (LSO-1168)
        #   - tests/e2e/test_product_edit.py                 (LSO-1166)
        #   - tests/e2e/test_product_management.py           (LSO-1166)
        #   - tests/e2e/test_product_merge_unsync.py         (LSO-1166)
        #   - tests/e2e/test_product_merge_unsync_browser.py (LSO-1166)
        #   - tests/e2e/test_protein_quality.py              (LSO-1168)
        #   - tests/e2e/test_scanner_ui.py                   (LSO-1162)
        #   - tests/e2e/test_settings.py                     (LSO-1167)
        #   - tests/e2e/test_settings_browser.py             (LSO-1167)
        #   - tests/e2e/test_tag_management.py               (LSO-1163)
        #   - tests/e2e/test_tags_crud.py                    (LSO-1163)
        #   - tests/e2e/test_tags_crud_browser.py            (LSO-1180)
        #   - tests/e2e/test_tags_suggestions.py             (LSO-1163)
        #   - tests/e2e/test_tags_suggestions_browser.py     (LSO-1180)
        #   - tests/e2e/test_weight_settings.py              (LSO-1167)
        #   - tests/e2e/test_weights.py                      (LSO-1167)
        #
        # EXCLUDED (pending per-file verification — full per-file table in LSO-1160):
        #   - 26 files in tests/e2e/ — see LSO-1160 for the canonical list and
        #     each file's blocking LSO (where one is known).
        #   - LSO-1039 (category move modal, 5 failures) is the known active blocker;
        #     remaining files just need per-file verification.
        run: python -m pytest tests/e2e/test_backup.py tests/e2e/test_backup_errors.py tests/e2e/test_backup_restore.py tests/e2e/test_backup_restore_ui.py tests/e2e/test_barcode_scanner.py tests/e2e/test_bulk_operations.py tests/e2e/test_bulk_operations_browser.py tests/e2e/test_categories_update_browser.py tests/e2e/test_category_delete_move.py tests/e2e/test_delete_undo.py tests/e2e/test_duplicate_merge.py tests/e2e/test_e2e_ocr_ingredients.py tests/e2e/test_e2e_settings.py tests/e2e/test_ean_management.py tests/e2e/test_eans.py tests/e2e/test_eans_browser.py tests/e2e/test_flag_crud.py tests/e2e/test_flags.py tests/e2e/test_ocr_flows.py tests/e2e/test_ocr_ingredient_translation.py tests/e2e/test_ocr_ingredients_browser.py tests/e2e/test_ocr_nutrition.py tests/e2e/test_ocr_settings.py tests/e2e/test_ocr_settings_browser.py tests/e2e/test_ocr_ui_errors.py tests/e2e/test_off_credentials.py tests/e2e/test_off_integration.py tests/e2e/test_off_integration_browser.py tests/e2e/test_off_review_modal.py tests/e2e/test_off_search_modal.py tests/e2e/test_pq_crud.py tests/e2e/test_pq_update.py tests/e2e/test_pq_update_browser.py tests/e2e/test_product_edit.py tests/e2e/test_product_management.py tests/e2e/test_product_merge_unsync.py tests/e2e/test_product_merge_unsync_browser.py tests/e2e/test_protein_quality.py tests/e2e/test_scanner_ui.py tests/e2e/test_settings.py tests/e2e/test_settings_browser.py tests/e2e/test_tag_management.py tests/e2e/test_tags_crud.py tests/e2e/test_tags_crud_browser.py tests/e2e/test_tags_suggestions.py tests/e2e/test_tags_suggestions_browser.py tests/e2e/test_weight_settings.py tests/e2e/test_weights.py --tb=short -q
