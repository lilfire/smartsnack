name: CI

on:
  push:
    branches: [development, main]
  pull_request:
    branches: [development, main]

jobs:
  test:
    name: Unit Tests (pytest)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt pytest pytest-cov

      - name: Run pytest with coverage
        run: python -m pytest --cov --ignore=tests/e2e --tb=short -q

  frontend-test:
    name: Frontend Tests (vitest)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run vitest with coverage
        run: npx vitest run --coverage

  e2e-coverage:
    name: E2E Endpoint Coverage Check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Check E2E endpoint coverage
        # Warning-only: does not block the build. Use --strict to make it a hard gate.
        run: python scripts/check_e2e_coverage.py

  build:
    name: Docker Build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image (no push)
        run: docker compose build
        env:
          SMARTSNACK_SECRET_KEY: ci-build-dummy-key
          DOCKER_BUILDKIT: "1"

  smoke-test:
    name: Smoke Test
    runs-on: ubuntu-latest
    needs: [build]
    env:
      SMARTSNACK_SECRET_KEY: ci-test-dummy-key
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Start containers
        run: docker compose up -d --build

      - name: Wait for healthcheck
        run: |
          echo "Waiting for container to be healthy..."
          for i in $(seq 1 30); do
            if docker compose ps --format json | grep -q '"Health":"healthy"'; then
              echo "Container is healthy"
              exit 0
            fi
            echo "Attempt $i/30 - waiting 5s..."
            sleep 5
          done
          echo "Container did not become healthy in time"
          docker compose logs
          exit 1

      - name: Verify health endpoint
        run: |
          curl -f http://localhost:5001/health || \
            (echo "Health endpoint failed"; docker compose logs; exit 1)

      - name: Tear down
        if: always()
        run: docker compose down

  e2e-test:
    name: E2E Tests (Playwright)
    runs-on: ubuntu-latest
    needs: [build]
    env:
      SMARTSNACK_SECRET_KEY: ci-e2e-dummy-key
      PLAYWRIGHT_BROWSERS_PATH: /tmp/ms-playwright
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y tesseract-ocr libcairo2

      - name: Install Python dependencies
        run: pip install -r requirements-dev.txt

      - name: Install Playwright browsers
        run: python -m playwright install --with-deps chromium

      - name: Run E2E tests
        # The tests/e2e/ conftest.py launches its own in-process Flask server
        # on a random port (see app_server fixture), so no external server is
        # needed. Tests use Playwright to drive a real browser against the
        # in-process app.
        #
        # E2E CI scope is an explicit allowlist. Full tests/e2e/ scope expansion
        # is tracked in LSO-1160 (https://github.com/lilfire/smartsnack — see
        # Paperclip issue LSO-1160 "Expand E2E CI scope to all tests/e2e/ files").
        #
        # INCLUDED (verified green in CI):
        #   - tests/e2e/test_backup.py                       (LSO-1161)
        #   - tests/e2e/test_backup_errors.py                (LSO-1161)
        #   - tests/e2e/test_backup_restore.py               (LSO-1161)
        #   - tests/e2e/test_backup_restore_ui.py            (LSO-1161)
        #   - tests/e2e/test_barcode_scanner.py              (LSO-1162)
        #   - tests/e2e/test_categories_update_browser.py    (LSO-1112/LSO-1128)
        #   - tests/e2e/test_category_delete_move.py         (LSO-1112/LSO-1128)
        #   - tests/e2e/test_delete_undo.py                  (LSO-1161)
        #   - tests/e2e/test_ean_management.py               (LSO-1162)
        #   - tests/e2e/test_eans.py                         (LSO-1162)
        #   - tests/e2e/test_eans_browser.py                 (LSO-1162)
        #   - tests/e2e/test_scanner_ui.py                   (LSO-1162)
        #   - tests/e2e/test_tag_management.py               (LSO-1163)
        #   - tests/e2e/test_tags_crud.py                    (LSO-1163)
        #   - tests/e2e/test_tags_crud_browser.py            (LSO-1163)
        #   - tests/e2e/test_tags_suggestions.py             (LSO-1163)
        #   - tests/e2e/test_tags_suggestions_browser.py     (LSO-1163)
        #
        # EXCLUDED (pending per-file verification — full per-file table in LSO-1160):
        #   - 57 files in tests/e2e/ — see LSO-1160 for the canonical list and
        #     each file's blocking LSO (where one is known).
        #   - LSO-1039 (category move modal, 5 failures) is the only known
        #     active blocker; remaining files just need per-file verification.
        run: python -m pytest tests/e2e/test_backup.py tests/e2e/test_backup_errors.py tests/e2e/test_backup_restore.py tests/e2e/test_backup_restore_ui.py tests/e2e/test_barcode_scanner.py tests/e2e/test_categories_update_browser.py tests/e2e/test_category_delete_move.py tests/e2e/test_delete_undo.py tests/e2e/test_ean_management.py tests/e2e/test_eans.py tests/e2e/test_eans_browser.py tests/e2e/test_scanner_ui.py tests/e2e/test_tag_management.py tests/e2e/test_tags_crud.py tests/e2e/test_tags_crud_browser.py tests/e2e/test_tags_suggestions.py tests/e2e/test_tags_suggestions_browser.py --tb=short -q
