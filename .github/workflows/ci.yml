name: CI

on:
  push:
    branches: [development]
  pull_request:
    branches: [development]

jobs:
  test:
    name: Unit Tests (pytest)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          pip install \
            flask==3.1.0 \
            flask-limiter==3.8.0 \
            gunicorn==23.0.0 \
            pyopenssl==24.3.0 \
            cryptography==43.0.3 \
            Pillow==11.1.0 \
            pytest==8.3.4 \
            pytest-cov==5.0.0

      - name: Run pytest (unit tests only)
        run: python -m pytest --ignore=tests/e2e --tb=short -q

  build:
    name: Docker Build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image (no push)
        run: docker compose build
        env:
          SMARTSNACK_SECRET_KEY: ci-build-dummy-key

  smoke-test:
    name: Smoke Test
    runs-on: ubuntu-latest
    needs: [build]
    env:
      SMARTSNACK_SECRET_KEY: ci-test-dummy-key
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Start containers
        run: docker compose up -d

      - name: Wait for healthcheck
        run: |
          echo "Waiting for container to be healthy..."
          for i in $(seq 1 30); do
            if docker compose ps --format json | grep -q '"Health":"healthy"'; then
              echo "Container is healthy"
              exit 0
            fi
            echo "Attempt $i/30 - waiting 5s..."
            sleep 5
          done
          echo "Container did not become healthy in time"
          docker compose logs
          exit 1

      - name: Verify health endpoint
        run: |
          curl -f http://localhost:5001/health || \
            (echo "Health endpoint failed"; docker compose logs; exit 1)

      - name: Tear down
        if: always()
        run: docker compose down
