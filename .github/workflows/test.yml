name: Tests

on:
  push:
    branches: [development, main]
  pull_request:
    branches: [development, main]

jobs:
  backend:
    name: Backend (pytest)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt pytest pytest-cov

      - name: Run pytest (unit tests only, e2e requires playwright + server)
        run: python -m pytest --ignore=tests/e2e --tb=short -q

  frontend:
    name: Frontend (vitest)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run vitest
        run: npx vitest run
