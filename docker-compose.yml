services:
  smartsnack:
    build: .
    ports:
      - "5000:5000"
      - "5001:5001"
    volumes:
      - smartsnack-data:/data
    environment:
      - SMARTSNACK_SECRET_KEY=${SMARTSNACK_SECRET_KEY:?Set SMARTSNACK_SECRET_KEY in .env or environment}
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:5001/health')"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

volumes:
  smartsnack-data:
